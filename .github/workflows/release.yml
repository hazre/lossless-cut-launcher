name: Build and Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions: {}

env:
  PROJECT: LosslessCutLauncher
  DOTNET_NOLOGO: true

jobs:
  build-artifacts:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.head_ref == 'release' && github.event.pull_request.merged == true) }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - platform: linux-x64
            self-contained: true
            extra-args: ''
          - platform: win-x64
            self-contained: false
            extra-args: '--noPortable --framework net10.0-x64-runtime'
          - platform: win-x64
            self-contained: true
            extra-args: '--noInst'
            is-portable: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Get Version from Project File
        id: get-version
        shell: bash
        run: echo "version=$(grep -oE '<AssemblyVersion>[^<]+' "${{ env.PROJECT }}/${{ env.PROJECT }}.csproj" | sed 's/<AssemblyVersion>//' | xargs)" >> "$GITHUB_OUTPUT"

      - name: Get Title from Project File
        id: get-title
        shell: bash
        run: echo "title=$(grep -oE '<Title>[^<]+' "${{ env.PROJECT }}/${{ env.PROJECT }}.csproj" | sed 's/<Title>//' | xargs)" >> "$GITHUB_OUTPUT"

      - name: Get Authors from Project File
        id: get-authors
        shell: bash
        run: echo "authors=$(grep -oE '<Authors>[^<]+' "${{ env.PROJECT }}/${{ env.PROJECT }}.csproj" | sed 's/<Authors>//' | xargs)" >> "$GITHUB_OUTPUT"

      - name: Get Velopack Version
        id: get-velopack-version
        shell: bash
        run: echo "version=$(dotnet msbuild "${{ env.PROJECT }}/${{ env.PROJECT }}.csproj" -getProperty:VelopackVersion | tail -n 1 | xargs)" >> "$GITHUB_OUTPUT"

      - name: Install Velopack CLI
        env:
          VELOPACK_VERSION: ${{ steps.get-velopack-version.outputs.version }}
        run: dotnet tool install -g vpk --version "$VELOPACK_VERSION"

      - name: Build Project
        run: dotnet publish ${{ env.PROJECT }}/${{ env.PROJECT }}.csproj -c Release -o publish/${{ matrix.platform }}${{ matrix.is-portable && '-portable' || '' }} -r ${{ matrix.platform }} ${{ matrix.self-contained && '--self-contained' || '--no-self-contained' }}

      - name: Download Previous Releases
        run: vpk download github --repoUrl ${{ github.server_url }}/${{ github.repository }} --channel ${{ matrix.platform }}${{ matrix.is-portable && '-portable' || '' }} -o releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark Release Cache
        id: mark-release-cache
        shell: bash
        run: |
          marker="$(mktemp)"
          touch "$marker"
          echo "path=$marker" >> "$GITHUB_OUTPUT"

      - name: Pack New Release
        shell: bash
        env:
          VPK_PREFIX: ${{ startsWith(matrix.platform, 'win') && '[win] ' || '' }}
          VERSION: ${{ steps.get-version.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
          TITLE: ${{ steps.get-title.outputs.title }}
          AUTHORS: ${{ steps.get-authors.outputs.authors }}
          CHANNEL: ${{ matrix.platform }}${{ matrix.is-portable && '-portable' || '' }}
          EXTRA_ARGS: ${{ matrix.extra-args }}
          PUBLISH_DIR: publish/${{ matrix.platform }}${{ matrix.is-portable && '-portable' || '' }}
        run: |
          vpk ${VPK_PREFIX}pack \
            -u "$PROJECT" \
            -v "$VERSION" \
            -r "$PLATFORM" \
            --packTitle "$TITLE" \
            --packAuthors "$AUTHORS" \
            --channel "$CHANNEL" \
            ${EXTRA_ARGS} \
            -p "$PUBLISH_DIR" \
            -o releases

      - name: Rename Portable Package
        if: matrix.is-portable
        shell: bash
        run: |
          mv "releases/${PROJECT}-${{ matrix.platform }}-portable-Portable.zip" "releases/${PROJECT}-${{ matrix.platform }}-portable.zip"
          JSON_FILE="releases/assets.${{ matrix.platform }}-portable.json"
          sed -i "s/${PROJECT}-${{ matrix.platform }}-portable-Portable.zip/${PROJECT}-${{ matrix.platform }}-portable.zip/g" "$JSON_FILE"

      - name: Collect Release Assets
        shell: bash
        env:
          RELEASE_CACHE_MARKER: ${{ steps.mark-release-cache.outputs.path }}
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done < <(find releases -type f \( -name 'releases.*.json' -o -name 'assets.*-portable.json' -o -name '*.nupkg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' \) -newer "$RELEASE_CACHE_MARKER" -print0)

      - name: Upload Release Assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ matrix.platform }}${{ matrix.is-portable && '-portable' || '' }}
          path: release-assets/*
          if-no-files-found: error

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.head_ref == 'release' && github.event.pull_request.merged == true) }}
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download Release Assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Install Knope
        uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2
        with:
          version: 0.22.3

      - name: Create Release
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
